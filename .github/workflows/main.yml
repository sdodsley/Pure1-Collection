name: Everpure Ansible CI

"on":
  pull_request:
  push:
  schedule:
    - cron: '25 10 * * *'

jobs:
  build:
    name: Build pure1 on Ansible ${{ matrix.ansible }} (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ansible:
          - stable-2.16
          - stable-2.17
          - stable-2.18
          - stable-2.19
          - stable-2.20
          - devel
        python-version:
          - "3.12"
          - "3.13"
          - "3.14"
        exclude:
          - python-version: "3.14"
            ansible: stable-2.16
          - python-version: "3.14"
            ansible: stable-2.17
          - python-version: "3.14"
            ansible: stable-2.18
          - python-version: "3.14"
            ansible: stable-2.19
          - python-version: "3.13"
            ansible: stable-2.16
          - python-version: "3.13"
            ansible: stable-2.17
          - python-version: "3.12"
            ansible: devel
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Run unit tests with coverage
      run: |
        pytest tests/ --cov=plugins --cov-report=html --cov-report=xml --cov-report=term -v --ignore=collections

    - name: Upload coverage report (HTML)
      if: matrix.python-version == '3.12'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-html
        path: htmlcov/

    - name: Upload coverage report (XML)
      if: matrix.python-version == '3.12'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-xml
        path: coverage.xml

    - name: Display coverage summary
      run: |
        echo "## Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        coverage report >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
